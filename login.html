<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter — CinexAI</title>
<link rel="icon" type="image/svg+xml" href="/fevicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --orange: #ff6b35;
    --orange2: #ff9b6b;
  }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── FILM GRAIN ── */
  .grain {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
    opacity: 0.055;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    animation: grain 0.4s steps(1) infinite;
  }
  @keyframes grain {
    0%,100%{transform:translate(0,0)}
    10%{transform:translate(-2%,-3%)}
    20%{transform:translate(3%,1%)}
    30%{transform:translate(-1%,4%)}
    40%{transform:translate(2%,-2%)}
    50%{transform:translate(-3%,2%)}
    60%{transform:translate(1%,-4%)}
    70%{transform:translate(3%,3%)}
    80%{transform:translate(-2%,1%)}
    90%{transform:translate(2%,-1%)}
  }

  /* ── VIGNETTE ── */
  .vignette {
    position: fixed; inset: 0; z-index: 2;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(0,0,0,0.5) 70%,
      rgba(0,0,0,0.92) 100%);
  }

  /* ── CINEMATIC BARS ── */
  .bar-top, .bar-bottom {
    position: fixed; left: 0; right: 0; z-index: 3;
    height: 80px;
    background: #000;
    transition: transform 1.8s cubic-bezier(0.76,0,0.24,1);
  }
  .bar-top { top: 0; transform: translateY(0); }
  .bar-bottom { bottom: 0; transform: translateY(0); }
  .bars-open .bar-top { transform: translateY(-100%); }
  .bars-open .bar-bottom { transform: translateY(100%); }

  /* ── AMBIENT GLOW ── */
  .glow-left {
    position: fixed; z-index: 2;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,53,0.08) 0%, transparent 70%);
    top: 50%; left: -100px;
    transform: translateY(-50%);
    pointer-events: none;
    animation: breathe 6s ease-in-out infinite;
  }
  .glow-right {
    position: fixed; z-index: 2;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(155,89,182,0.06) 0%, transparent 70%);
    bottom: 10%; right: -80px;
    pointer-events: none;
    animation: breathe 8s ease-in-out infinite reverse;
  }
  @keyframes breathe {
    0%,100%{opacity:0.6;transform:translateY(-50%) scale(1)}
    50%{opacity:1;transform:translateY(-50%) scale(1.15)}
  }
  .glow-right { animation: breatheR 8s ease-in-out infinite reverse; }
  @keyframes breatheR {
    0%,100%{opacity:0.5;transform:scale(1)}
    50%{opacity:0.9;transform:scale(1.2)}
  }

  /* ── SCAN LINE ── */
  .scanline {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* ── MAIN STAGE ── */
  .stage {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }

  /* ── LOGO ── */
  .logo-wrap {
    opacity: 0;
    transform: scale(0.88) translateY(20px);
    transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.34,1.56,0.64,1);
    margin-bottom: 32px;
  }
  .logo-wrap.visible {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
  .logo-wrap img {
    height: 72px;
    width: auto;
    filter: drop-shadow(0 0 40px rgba(255,107,53,0.35));
  }

  /* ── TAGLINE ── */
  .tagline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(13px, 2vw, 18px);
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 1s ease 0.4s, transform 1s ease 0.4s;
    margin-bottom: 64px;
  }
  .tagline.visible { opacity: 1; transform: translateY(0); }

  /* ── DIVIDER LINE ── */
  .divider {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,107,53,0.6), transparent);
    margin-bottom: 64px;
    transition: width 1.2s cubic-bezier(0.76,0,0.24,1) 0.3s;
  }
  .divider.visible { width: 240px; }

  /* ── CTA ── */
  .cta-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 20px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.9s ease 0.8s, transform 0.9s ease 0.8s;
  }
  .cta-wrap.visible { opacity: 1; transform: translateY(0); }

  .btn-enter {
    display: inline-flex; align-items: center; gap: 12px;
    background: linear-gradient(135deg, var(--orange), #e85a2a);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 16px 48px;
    border-radius: 4px;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 0 0 rgba(255,107,53,0);
  }
  .btn-enter::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-enter:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 40px rgba(255,107,53,0.45), 0 0 0 1px rgba(255,107,53,0.3);
  }
  .btn-enter:hover::before { opacity: 1; }
  .btn-enter .arrow {
    font-size: 18px;
    transition: transform 0.3s ease;
  }
  .btn-enter:hover .arrow { transform: translateX(4px); }

  /* ── BACK LINK ── */
  .back-link {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.2);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .back-link:hover { color: rgba(255,255,255,0.5); }

  /* ── CORNER ACCENTS ── */
  .corner { position: fixed; z-index: 4; width: 32px; height: 32px; }
  .corner.tl { top: 24px; left: 24px; border-top: 1px solid rgba(255,107,53,0.3); border-left: 1px solid rgba(255,107,53,0.3); }
  .corner.tr { top: 24px; right: 24px; border-top: 1px solid rgba(255,107,53,0.3); border-right: 1px solid rgba(255,107,53,0.3); }
  .corner.bl { bottom: 24px; left: 24px; border-bottom: 1px solid rgba(255,107,53,0.3); border-left: 1px solid rgba(255,107,53,0.3); }
  .corner.br { bottom: 24px; right: 24px; border-bottom: 1px solid rgba(255,107,53,0.3); border-right: 1px solid rgba(255,107,53,0.3); }

  /* ── FRAME COUNT (film aesthetic) ── */
  .frame-count {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    z-index: 4;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 1s ease 1.5s;
  }
  .frame-count.visible { opacity: 1; }
</style>
</head>
<body>

<div class="grain"></div>
<div class="scanline"></div>
<div class="vignette"></div>
<div class="glow-left"></div>
<div class="glow-right"></div>

<div class="bar-top" id="barTop"></div>
<div class="bar-bottom" id="barBottom"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="stage">
  <div class="logo-wrap" id="logo">
    <img src="/Logo.svg" alt="CinexAI">
  </div>
  <div class="tagline" id="tagline">The AI Media Studio</div>
  <div class="divider" id="divider"></div>
  <div class="cta-wrap" id="cta">
    <a href="https://thestudioastro.vercel.app" class="btn-enter">
      Enter the Studio
      <span class="arrow">→</span>
    </a>
    <a href="/" class="back-link">← Back to website</a>
  </div>
</div>

<div class="frame-count" id="frameCount">CINEXAI · MMXXVI · AI PRODUCTION</div>

<script>
  // Sequence: open bars → reveal logo → tagline → divider → cta
  document.body.classList.remove('bars-open');

  setTimeout(() => {
    document.body.classList.add('bars-open');
  }, 200);

  setTimeout(() => {
    document.getElementById('logo').classList.add('visible');
  }, 800);

  setTimeout(() => {
    document.getElementById('tagline').classList.add('visible');
    document.getElementById('divider').classList.add('visible');
  }, 1200);

  setTimeout(() => {
    document.getElementById('cta').classList.add('visible');
    document.getElementById('frameCount').classList.add('visible');
  }, 1600);
</script>
</body>
</html>
